# Docker 镜像构建工作流
name: Docker Build

on:
  workflow_call:
    inputs:
      version:
        description: '要构建的版本号'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve rw-node-go version
        id: go_version
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < .go-paas-version)"
          if [[ -z "$version" ]]; then
            echo "::error::Unable to resolve rw-node-go version from .go-paas-version"
            exit 1
          fi
          version_stripped="${version#v}"
          echo "version=$version_stripped" >> "$GITHUB_OUTPUT"
          echo "version_raw=$version" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.go_version.outputs.version }}
            type=raw,value=${{ steps.go_version.outputs.version }}-go-paas
            type=raw,value=latest
            type=raw,value=latest-go-paas
          labels: |
            org.opencontainers.image.description=Go Implementation PaaS HTTPS Direct

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            RW_NODE_GO_VERSION=${{ steps.go_version.outputs.version_raw }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  summary:
    name: Build Summary
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Summary
        run: |
          echo "## Docker Images Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | Description |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------------|" >> $GITHUB_STEP_SUMMARY
          echo "| \`ghcr.io/${{ github.repository }}:latest\` | Go Implementation PaaS HTTPS Direct |" >> $GITHUB_STEP_SUMMARY
          echo "| \`ghcr.io/${{ github.repository }}:latest-go-paas\` | Go Implementation PaaS HTTPS Direct (alias) |" >> $GITHUB_STEP_SUMMARY
