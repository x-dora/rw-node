# 统一的 Release 入口：
# - 自动路径：代码/配置变更 push 到 main 自动触发 Docker 镜像构建
# - 手动路径：workflow_dispatch 手动强制构建指定版本
name: Release

on:
  push:
    branches: [main]
    paths:
      - '.go-paas-version'
      - 'lib/**'
      - 'scripts/**'
      - 'config/**'
      - 'docker/**'
      - '.github/workflows/release.yml'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（留空则读取 .go-paas-version）'
        required: false
        type: string
      build_docker:
        description: '构建 Docker 镜像'
        required: false
        type: boolean
        default: true

jobs:
  resolve:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      build_docker: ${{ steps.v.outputs.build_docker }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve version and flags
        id: v
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            echo "build_docker=${{ github.event.inputs.build_docker }}" >> "$GITHUB_OUTPUT"
          else
            VERSION=""
            echo "build_docker=true" >> "$GITHUB_OUTPUT"
          fi

          if [[ -z "$VERSION" ]]; then
            if [[ ! -f .go-paas-version ]]; then
              echo "::error::.go-paas-version 文件不存在且未提供 version 输入"
              exit 1
            fi
            VERSION=$(tr -d '[:space:]' < .go-paas-version)
          fi

          if [[ -z "$VERSION" ]]; then
            echo "::error::无法解析版本号"
            exit 1
          fi

          echo "Resolved version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build-docker:
    name: Build Docker Image
    needs: [resolve]
    if: ${{ needs.resolve.outputs.build_docker == 'true' }}
    uses: ./.github/workflows/docker-build.yml
    with:
      version: ${{ needs.resolve.outputs.version }}
    permissions:
      contents: read
      packages: write
